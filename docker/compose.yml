# docker/compose.yml
services:
  news_pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: news_pipeline
    restart: unless-stopped
    volumes:
      - ../data:/app/data
      - ../config:/app/config:ro
      - ../logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-m", "news_pipeline.healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'

  # Datasette: SQLite browser at http://localhost:8001 (read-only).
  # Replaces the old Feishu bitable archive — much simpler.
  # Default binds to 127.0.0.1 only (secure). To access remotely, either:
  #   a) SSH tunnel: ssh -L 8001:localhost:8001 user@server
  #   b) Bind public + add nginx + basic auth (change "127.0.0.1:8001:8001" → "8001:8001")
  ports:                  
    - "127.0.0.1:9001"   # ← 改这里
  datasette:
    image: datasetteproject/datasette:latest
    container_name: news_datasette
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ../data:/data:ro
    command: >-
      datasette /data/news.db
      --host 0.0.0.0
      --port 8001
      --setting allow_download on
      --setting suggest_facets on
      --setting default_page_size 50
      --setting sql_time_limit_ms 5000
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
