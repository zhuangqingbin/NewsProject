  # 通用关键词 — 命中即入库，不绑定个股。这是让 A股/美股星盘"有货"的主力杠杆
  keyword_list:
    us:
      [Powell, Fed, FOMC, recession, rate cut, rate hike, tariff, Trump,
       layoffs, earnings beat, earnings miss, guidance, downgrade, upgrade]
    cn:
      [证监会, 国常会, 国务院, 财政部, 发改委, 北交所, 科创板, 创业板,
       IPO, 减持, 回购, 分红, 重组, 并购, 业绩快报, 业绩预告,
       降准, 降息, 公开市场操作, 外资, 北上资金, 南下资金]

  # 宏观词 — 命中后通过 macro_links 关联到引用它的 ticker
  macro_keywords:
    us: [FOMC, CPI, NFP, PPI, PMI, GDP, rate, inflation]
    cn: [央行, MLF, LPR, OMO, PMI, PPI, CPI, GDP, 社融, 国债收益率]

  # 板块词 — 同理通过 sectors 关联
  sector_keywords:
    us: [semiconductor, ai, ev, autonomous, robotaxi, FSD, chip, GPU,
         social, VR, cloud, search]
    cn:
      [新能源, 半导体, 白酒, 存储, 机器人, 液冷,
       通信, CPO, 共封装光学, 光模块, 光通信,
       CRO, 医药, 创新药, 仿制药, 生物制药,
       MEMS, 晶圆, 封测, 设备, 材料, 代工,
       AI, 芯片, 电动车, 汽车, 锂电池, 储能]

llm:
  enable: false
  us: [NVDA, TSLA]
  cn: ["600519"]
  macro: [FOMC, CPI, NFP, 央行, MLF, LPR]
  sectors: [semiconductor, ai, ev, 新能源, 半导体, 白酒]
